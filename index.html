<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagrama p–V | Termodinâmica</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: Georgia, serif;
      color: #e2e8f0;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.08em;
      margin-bottom: 0.3rem;
      color: #f8fafc;
      font-weight: 700;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .buttons {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .btn {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 2px solid;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      transition: background 0.2s, color 0.2s;
    }

    .btn.active { color: #fff; }

    svg {
      display: block;
      background: #1e293b;
      border-radius: 1rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      max-width: 100%;
    }

    .info-card {
      margin-top: 1.2rem;
      background: #1e293b;
      border-radius: 0.75rem;
      padding: 1rem 1.4rem;
      width: 560px;
      max-width: 100%;
      border: 1px solid transparent;
      transition: border-color 0.3s;
    }

    .info-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.4rem;
    }

    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .info-title { font-size: 0.95rem; font-weight: bold; }
    .info-desc { color: #cbd5e1; font-size: 0.88rem; line-height: 1.6; }
    .info-formula { color: #64748b; font-size: 0.82rem; margin-top: 0.6rem; font-family: monospace; }
  </style>
</head>
<body>

<h1>Diagrama <em>p</em>–<em>V</em></h1>
<p class="subtitle">Trabalho realizado pelo gás = área sob a curva</p>

<div class="buttons" id="buttons"></div>

<svg id="svg" width="560" height="400" viewBox="0 0 560 400"></svg>

<div class="info-card" id="info-card">
  <div class="info-header">
    <span class="dot" id="info-dot"></span>
    <strong class="info-title" id="info-title"></strong>
  </div>
  <p class="info-desc" id="info-desc"></p>
  <p class="info-formula" id="info-formula"></p>
</div>

<script>
const WIDTH = 560, HEIGHT = 400;
const PAD = { top: 40, right: 40, bottom: 60, left: 70 };
const PLOT_W = WIDTH - PAD.left - PAD.right;
const PLOT_H = HEIGHT - PAD.top - PAD.bottom;
const V_MIN = 0.5, V_MAX = 3.5, P_MIN = 0, P_MAX = 5;

function toX(v) { return PAD.left + ((v - V_MIN) / (V_MAX - V_MIN)) * PLOT_W; }
function toY(p) { return PAD.top + ((P_MAX - p) / (P_MAX - P_MIN)) * PLOT_H; }

const PROCESSES = [
  {
    id: "isothermal",
    label: "Isotérmico (T = cte)",
    color: "#3b82f6",
    desc: "A temperatura é constante. A pressão e o volume variam inversamente (p·V = cte). A curva é uma hipérbole no diagrama p–V.",
    formula: "W = ∫ p dV  |  área colorida sob a curva",
    getPoints() {
      const pts = [];
      for (let v = 1.0; v <= 3.0; v += 0.05) pts.push([v, 4.5 / v]);
      return pts;
    }
  },
  {
    id: "isobaric",
    label: "Isobárico (p = cte)",
    color: "#10b981",
    desc: "A pressão é constante. O trabalho é simplesmente W = p·ΔV — um retângulo no diagrama p–V.",
    formula: "W = p · ΔV  |  área do retângulo sob a linha",
    getPoints() { return [[1.0, 2.5], [3.0, 2.5]]; }
  },
  {
    id: "isochoric",
    label: "Isocórico (V = cte)",
    color: "#f59e0b",
    desc: "O volume é constante. O êmbolo não se move, portanto o trabalho realizado pelo gás é zero (W = 0).",
    formula: "ΔV = 0  →  W = 0  (nenhum trabalho realizado)",
    getPoints() { return [[2.0, 1.2], [2.0, 3.8]]; }
  },
  {
    id: "adiabatic",
    label: "Adiabático (Q = 0)",
    color: "#ef4444",
    desc: "Sem troca de calor com o ambiente. A curva cai mais abruptamente do que a isotérmica, pois a temperatura também diminui com a expansão.",
    formula: "W = ∫ p dV  |  área colorida sob a curva",
    getPoints() {
      const pts = [], gamma = 1.4, C = 4.2 * Math.pow(1.0, gamma);
      for (let v = 1.0; v <= 3.0; v += 0.05) pts.push([v, C / Math.pow(v, gamma)]);
      return pts;
    }
  }
];

// SVG helpers
const svgNS = "http://www.w3.org/2000/svg";
function el(tag, attrs = {}, text = "") {
  const e = document.createElementNS(svgNS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (text) e.textContent = text;
  return e;
}

function buildPathD(pts) {
  return pts.map(([v, p], i) => `${i === 0 ? "M" : "L"}${toX(v).toFixed(1)},${toY(p).toFixed(1)}`).join(" ");
}

function buildAreaD(pts) {
  const first = pts[0], last = pts[pts.length - 1];
  const bottom = toY(0);
  return buildPathD(pts) +
    ` L${toX(last[0]).toFixed(1)},${bottom} L${toX(first[0]).toFixed(1)},${bottom} Z`;
}

// Build static SVG structure (grid, axes, defs)
const svg = document.getElementById("svg");

// Defs
const defs = el("defs");
const clip = el("clipPath", { id: "plot-clip" });
clip.appendChild(el("rect", { x: PAD.left, y: PAD.top, width: PLOT_W, height: PLOT_H }));
defs.appendChild(clip);

function makeArrow(id, d) {
  const m = el("marker", { id, markerWidth: 8, markerHeight: 8, refX: id === "arrowX" ? 6 : 3, refY: id === "arrowX" ? 3 : 6, orient: "auto" });
  m.appendChild(el("path", { d, fill: "none", stroke: "#64748b", "stroke-width": "1.2" }));
  defs.appendChild(m);
}
makeArrow("arrowX", "M0,0 L6,3 L0,6");
makeArrow("arrowY", "M0,6 L3,0 L6,6");
svg.appendChild(defs);

// Grid
const vTicks = [1, 1.5, 2, 2.5, 3];
const pTicks = [1, 2, 3, 4];
const gridG = el("g");
vTicks.forEach(v => gridG.appendChild(el("line", { x1: toX(v), y1: PAD.top, x2: toX(v), y2: PAD.top + PLOT_H, stroke: "#334155", "stroke-width": 1, "stroke-dasharray": "4,4" })));
pTicks.forEach(p => gridG.appendChild(el("line", { x1: PAD.left, y1: toY(p), x2: PAD.left + PLOT_W, y2: toY(p), stroke: "#334155", "stroke-width": 1, "stroke-dasharray": "4,4" })));
svg.appendChild(gridG);

// Dynamic layer (area + curve + labels)
const dynG = el("g", { id: "dyn" });
svg.appendChild(dynG);

// Axes
const axesG = el("g");
axesG.appendChild(el("line", { x1: PAD.left, y1: PAD.top + PLOT_H, x2: PAD.left + PLOT_W + 20, y2: PAD.top + PLOT_H, stroke: "#64748b", "stroke-width": 1.5, "marker-end": "url(#arrowX)" }));
axesG.appendChild(el("line", { x1: PAD.left, y1: PAD.top + PLOT_H, x2: PAD.left, y2: PAD.top - 20, stroke: "#64748b", "stroke-width": 1.5, "marker-end": "url(#arrowY)" }));
axesG.appendChild(el("text", { x: PAD.left + PLOT_W + 24, y: PAD.top + PLOT_H + 5, fill: "#94a3b8", "font-size": 15, "font-style": "italic" }, "V"));
axesG.appendChild(el("text", { x: PAD.left - 10, y: PAD.top - 24, fill: "#94a3b8", "font-size": 15, "font-style": "italic" }, "p"));
// V ticks
vTicks.forEach(v => {
  axesG.appendChild(el("line", { x1: toX(v), y1: PAD.top + PLOT_H, x2: toX(v), y2: PAD.top + PLOT_H + 5, stroke: "#64748b", "stroke-width": 1 }));
  axesG.appendChild(el("text", { x: toX(v), y: PAD.top + PLOT_H + 18, fill: "#64748b", "font-size": 11, "text-anchor": "middle" }, v));
});
// P ticks
pTicks.forEach(p => {
  axesG.appendChild(el("line", { x1: PAD.left - 5, y1: toY(p), x2: PAD.left, y2: toY(p), stroke: "#64748b", "stroke-width": 1 }));
  axesG.appendChild(el("text", { x: PAD.left - 12, y: toY(p) + 4, fill: "#64748b", "font-size": 11, "text-anchor": "end" }, p));
});
// Unit hints
axesG.appendChild(el("text", { x: PAD.left + PLOT_W / 2, y: HEIGHT - 4, fill: "#475569", "font-size": 10, "text-anchor": "middle" }, "Volume (m³)"));
const pt = el("text", { x: 12, y: PAD.top + PLOT_H / 2, fill: "#475569", "font-size": 10, "text-anchor": "middle", transform: `rotate(-90,12,${PAD.top + PLOT_H / 2})` }, "Pressão (Pa)");
axesG.appendChild(pt);
svg.appendChild(axesG);

// Animated dot layer (on top)
const animDotEl = el("circle", { r: 5, fill: "#fff", opacity: 0.85 });
svg.appendChild(animDotEl);

// State
let selected = "isothermal";
let animRAF = null;

function render(procId) {
  selected = procId;
  const proc = PROCESSES.find(p => p.id === procId);
  const pts = proc.getPoints();
  const isochoric = procId === "isochoric";
  const first = pts[0], last = pts[pts.length - 1];
  const pi = first[1], pf = last[1], vi = first[0], vf = last[0];

  // Clear dynamic layer
  while (dynG.firstChild) dynG.removeChild(dynG.firstChild);

  // Area
  if (!isochoric) {
    dynG.appendChild(el("path", { d: buildAreaD(pts), fill: proc.color, "fill-opacity": 0.15, "clip-path": "url(#plot-clip)" }));
  }

  // Curve
  const curve = el("path", { d: buildPathD(pts), fill: "none", stroke: proc.color, "stroke-width": 3, "stroke-linecap": "round", "clip-path": "url(#plot-clip)", filter: `drop-shadow(0 0 6px ${proc.color}88)` });
  dynG.appendChild(curve);

  // Dashed reference lines
  if (!isochoric) {
    // Vertical Vi
    dynG.appendChild(el("line", { x1: toX(vi), y1: toY(pi), x2: toX(vi), y2: PAD.top + PLOT_H, stroke: proc.color, "stroke-width": 1.2, "stroke-dasharray": "5,3", opacity: 0.6 }));
    // Vertical Vf
    dynG.appendChild(el("line", { x1: toX(vf), y1: toY(pf), x2: toX(vf), y2: PAD.top + PLOT_H, stroke: proc.color, "stroke-width": 1.2, "stroke-dasharray": "5,3", opacity: 0.6 }));
    // Horizontal pi
    dynG.appendChild(el("line", { x1: PAD.left, y1: toY(pi), x2: toX(vi), y2: toY(pi), stroke: proc.color, "stroke-width": 1.2, "stroke-dasharray": "5,3", opacity: 0.6 }));
    // Horizontal pf
    dynG.appendChild(el("line", { x1: PAD.left, y1: toY(pf), x2: toX(vf), y2: toY(pf), stroke: proc.color, "stroke-width": 1.2, "stroke-dasharray": "5,3", opacity: 0.6 }));
    // Labels Vi, Vf
    dynG.appendChild(el("text", { x: toX(vi), y: PAD.top + PLOT_H + 34, fill: proc.color, "font-size": 12, "text-anchor": "middle", "font-style": "italic" }, "Vᵢ"));
    dynG.appendChild(el("text", { x: toX(vf), y: PAD.top + PLOT_H + 34, fill: proc.color, "font-size": 12, "text-anchor": "middle", "font-style": "italic" }, "Vf"));
    // Labels pi, pf
    dynG.appendChild(el("text", { x: PAD.left - 12, y: toY(pi) + 4, fill: proc.color, "font-size": 12, "text-anchor": "end", "font-style": "italic" }, "pᵢ"));
    dynG.appendChild(el("text", { x: PAD.left - 12, y: toY(pf) + 4, fill: proc.color, "font-size": 12, "text-anchor": "end", "font-style": "italic" }, "pf"));
    // Work label
    dynG.appendChild(el("text", { x: toX((vi + vf) / 2), y: toY((pi + pf) / 2) + 10, fill: proc.color, "font-size": 13, "text-anchor": "middle", "font-style": "italic", opacity: 0.85 }, "W = ∫p dV"));
  } else {
    dynG.appendChild(el("text", { x: toX(2) + 16, y: toY(2.5), fill: proc.color, "font-size": 13, "font-style": "italic", opacity: 0.9 }, "W = 0"));
  }

  // Start/end dots
  dynG.appendChild(el("circle", { cx: toX(first[0]), cy: toY(first[1]), r: 6, fill: proc.color, stroke: "#1e293b", "stroke-width": 2 }));
  dynG.appendChild(el("circle", { cx: toX(last[0]), cy: toY(last[1]), r: 6, fill: proc.color, stroke: "#1e293b", "stroke-width": 2 }));
  dynG.appendChild(el("text", { x: toX(first[0]) - 14, y: toY(first[1]) - 10, fill: "#f8fafc", "font-size": 13, "font-weight": "bold" }, "i"));
  dynG.appendChild(el("text", { x: toX(last[0]) + 8, y: toY(last[1]) - 10, fill: "#f8fafc", "font-size": 13, "font-weight": "bold" }, "f"));

  // Animate dot
  cancelAnimationFrame(animRAF);
  const duration = 900;
  let start = null;
  function step(ts) {
    if (!start) start = ts;
    const t = Math.min((ts - start) / duration, 1);
    const idx = Math.floor(t * (pts.length - 1));
    const dp = pts[Math.min(idx, pts.length - 1)];
    animDotEl.setAttribute("cx", toX(dp[0]));
    animDotEl.setAttribute("cy", toY(dp[1]));
    animDotEl.setAttribute("opacity", t < 1 ? 0.85 : 0);
    if (t < 1) animRAF = requestAnimationFrame(step);
  }
  animDotEl.setAttribute("opacity", 0.85);
  animRAF = requestAnimationFrame(step);

  // Info card
  document.getElementById("info-card").style.borderColor = proc.color + "44";
  document.getElementById("info-dot").style.background = proc.color;
  document.getElementById("info-title").style.color = proc.color;
  document.getElementById("info-title").textContent = proc.label;
  document.getElementById("info-desc").textContent = proc.desc;
  document.getElementById("info-formula").textContent = proc.formula;

  // Buttons
  document.querySelectorAll(".btn").forEach(b => {
    const p = PROCESSES.find(p => p.id === b.dataset.id);
    b.style.borderColor = p.color;
    if (b.dataset.id === procId) {
      b.style.background = p.color;
      b.style.color = "#fff";
    } else {
      b.style.background = "transparent";
      b.style.color = p.color;
    }
  });
}

// Build buttons
const buttonsDiv = document.getElementById("buttons");
PROCESSES.forEach(p => {
  const btn = document.createElement("button");
  btn.className = "btn";
  btn.dataset.id = p.id;
  btn.textContent = p.label;
  btn.style.borderColor = p.color;
  btn.style.color = p.color;
  btn.addEventListener("click", () => render(p.id));
  buttonsDiv.appendChild(btn);
});

// Initial render
render("isothermal");
</script>
</body>
</html>
